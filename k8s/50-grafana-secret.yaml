# Default admin login: admin / admin (CHANGE BEFORE EXPOSING).
# Replace via: kubectl -n codeplex-ai create secret generic grafana-admin \
#   --from-literal=admin-user=admin --from-literal=admin-password='strong-password' \
#   --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: codeplex-ai
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: codeplex-ai
type: Opaque
stringData:
  admin-user: admin
  admin-password: admin

apiVersion: v1
kind: ConfigMap
metadata:
  name: codeplex-ai-config
  namespace: codeplex-ai
  labels:
    app.kubernetes.io/name: codeplex-ai
    app.kubernetes.io/part-of: codeplex-ai
data:
  ENVIRONMENT: "production"
  DEBUG: "False"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_WORKERS: "4"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  REDIS_URL: "redis://redis:6379/0"
  # SQLite lives on the per-pod emptyDir volume mounted at /data.
  # Swap to postgresql://user:pass@postgres:5432/codeplex for shared state.
  DATABASE_URL: "sqlite:////data/codeplex.db"
  GOOGLE_MODEL: "gemini-2.5-flash"
  OPENAI_MODEL: "gpt-4"
  ANTHROPIC_MODEL: "claude-3-opus"
  OPENAI_TEMPERATURE: "0.7"
  ENABLE_CACHING: "True"
  ENABLE_RATE_LIMITING: "True"
  CACHE_TTL: "3600"
  CACHE_MAX_SIZE: "1000"
  MAX_REQUEST_SIZE: "10485760"
  REQUEST_TIMEOUT: "30"
  # Empty list = same-origin only. Set to comma-separated origins for browser CORS.
  CORS_ORIGINS: ""
  # Send gunicorn logs to stdout/stderr (the dash) so they're picked up by
  # the cluster's log shipper instead of being trapped in the container fs.
  ACCESS_LOG: "-"
  ERROR_LOG: "-"
  # Multi-worker metrics aggregation directory; the deployment mounts an
  # emptyDir at this path so each worker can write counter/histogram files
  # that the collector merges on /metrics scrapes.
  PROMETHEUS_MULTIPROC_DIR: "/tmp/prometheus_multiproc"

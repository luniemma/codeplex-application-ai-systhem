apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: codeplex-ai
  namespace: codeplex-ai
  labels:
    app.kubernetes.io/name: codeplex-ai
    app.kubernetes.io/part-of: codeplex-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: codeplex-ai
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60

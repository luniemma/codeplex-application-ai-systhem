# Example Secret — DO NOT commit a populated copy.
#
# Real usage:
#   cp 11-secret.example.yaml 11-secret.yaml
#   # edit 11-secret.yaml to fill in real values
#   kubectl apply -f 11-secret.yaml
#   # or, generate from a .env file directly:
#   kubectl -n codeplex-ai create secret generic codeplex-ai-secrets \
#       --from-env-file=.env --dry-run=client -o yaml | kubectl apply -f -
#
# At minimum, ONE provider key must be a real value (not the `your_*`
# placeholder) for /readyz to return 200.
apiVersion: v1
kind: Secret
metadata:
  name: codeplex-ai-secrets
  namespace: codeplex-ai
  labels:
    app.kubernetes.io/name: codeplex-ai
    app.kubernetes.io/part-of: codeplex-ai
type: Opaque
stringData:
  OPENAI_API_KEY: "your_openai_key_here"
  ANTHROPIC_API_KEY: "yyour_google_key_hereour_anthropic_key_here"
  GOOGLE_API_KEY: "AIzaSyApQlLM1QZASX59zi_R74qlC08TJACdlq0"
  # Change these for production — anything random and >= 32 chars is fine.
  SECRET_KEY: "change-me-for-production-please"
  JWT_SECRET: "change-me-for-production-please"

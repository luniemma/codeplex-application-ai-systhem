apiVersion: v1
kind: ServiceAccount
metadata:
  name: codeplex-ai
  namespace: codeplex-ai
  labels:
    app.kubernetes.io/name: codeplex-ai
    app.kubernetes.io/part-of: codeplex-ai
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: codeplex-ai
  namespace: codeplex-ai
  labels:
    app.kubernetes.io/name: codeplex-ai
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: codeplex-ai
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: codeplex-ai
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: codeplex-ai
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: codeplex-ai
      annotations:
        # Tells static-config Prometheus to scrape this pod directly.
        # ServiceMonitor users (kube-prometheus-stack) can ignore these.
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: codeplex-ai
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: codeplex-ai
          image: luniemma/codeplex-ai:latest
          imagePullPolicy: IfNotPresent
          # Override the Dockerfile CMD so we pick up gunicorn_config.py
          # (needed for the child_exit hook that cleans up dead-worker
          # metrics files) and so logs go to stdout/stderr.
          command: ["gunicorn"]
          args:
            - --config=gunicorn_config.py
            - --bind=0.0.0.0:8000
            - main:create_app()
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: codeplex-ai-config
            - secretRef:
                name: codeplex-ai-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24    # 24*5s = 2min budget for cold start
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            - name: prom-multiproc
              mountPath: /tmp/prometheus_multiproc
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: prom-multiproc
          emptyDir: {}
        - name: logs
          emptyDir: {}

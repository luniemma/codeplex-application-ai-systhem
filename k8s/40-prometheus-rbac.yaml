apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: codeplex-ai
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: codeplex-ai
---
# Namespace-scoped — Prometheus only watches pods in codeplex-ai. If you want
# cluster-wide discovery, swap Role/RoleBinding for ClusterRole/ClusterRoleBinding.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prometheus
  namespace: codeplex-ai
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus
  namespace: codeplex-ai
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: codeplex-ai

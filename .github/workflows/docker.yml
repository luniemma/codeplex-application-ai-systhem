# Caller workflow that delegates to build-docker.yml.
# - On every push to master: build, smoke test, and publish to GHCR + Docker Hub.
# - On pull requests: build and smoke test only — never push.
#
# Required repo secrets for Docker Hub publishing:
#   DOCKERHUB_USERNAME — your Docker Hub login
#   DOCKERHUB_TOKEN    — Docker Hub access token (NOT your password)

name: Docker

on:
  push:
    branches: [master, main]
    # Avoid running for doc-only changes that can't break the build.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    paths:
      - "Dockerfile"
      - "Dockerfile.dev"
      - "requirements.txt"
      - "main.py"
      - "app/**"
      - "gunicorn_config.py"
      - ".github/workflows/docker.yml"
      - ".github/workflows/build-docker.yml"
  workflow_dispatch:
    inputs:
      push:
        description: "Publish the resulting image to both registries"
        type: boolean
        required: false
        default: false

jobs:
  build:
    name: Build & publish image
    uses: ./.github/workflows/build-docker.yml
    permissions:
      contents: read
      packages: write          # GHCR push
      id-token: write          # cosign keyless signing via Sigstore OIDC
      security-events: write   # Trivy SARIF upload to Code Scanning
    with:
      # Push when pushing to master/main, or on manual dispatch with push=true.
      # Otherwise just build + smoke test (PRs, doc changes, etc.).
      push_to_ghcr: ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')) || (github.event_name == 'workflow_dispatch' && inputs.push) }}
      push_to_dockerhub: ${{ (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')) || (github.event_name == 'workflow_dispatch' && inputs.push) }}
      # Edit this to your Docker Hub user/repo if it differs from `luniemma`.
      dockerhub_image: "luniemma/codeplex.ai"
    secrets: inherit

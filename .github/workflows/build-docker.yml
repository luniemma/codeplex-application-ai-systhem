# Reusable workflow: builds the Codeplex AI Docker image, smoke-tests it
# (boots the container and verifies /health returns 200 with the expected
# envelope shape), and optionally publishes the image to GHCR, Docker Hub,
# or both.
#
# Call from another workflow with:
#
#   jobs:
#     docker:
#       uses: ./.github/workflows/build-docker.yml
#       permissions:
#         contents: read
#         packages: write   # only needed when push_to_ghcr=true
#       with:
#         push_to_ghcr: true
#         push_to_dockerhub: true
#         dockerhub_image: "luniemma/codeplex-ai"
#       secrets: inherit    # so DOCKERHUB_USERNAME/DOCKERHUB_TOKEN reach this workflow
#
# Required repo secrets when push_to_dockerhub is true:
#   DOCKERHUB_USERNAME — your Docker Hub login
#   DOCKERHUB_TOKEN    — Docker Hub access token (NOT your password)
#                        Create at https://hub.docker.com/settings/security

name: Build Docker image

on:
  workflow_call:
    inputs:
      dockerfile:
        description: "Path to the Dockerfile to build."
        type: string
        required: false
        default: Dockerfile
      tag:
        description: "Human-readable tag (in addition to the immutable SHA tag)."
        type: string
        required: false
        default: latest
      push_to_ghcr:
        description: "Push the image to GitHub Container Registry."
        type: boolean
        required: false
        default: false
      push_to_dockerhub:
        description: "Push the image to Docker Hub. Requires DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets."
        type: boolean
        required: false
        default: false
      dockerhub_image:
        description: "Docker Hub image path (e.g. 'luniemma/codeplex-ai'). Required when push_to_dockerhub=true."
        type: string
        required: false
        default: ""
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
    outputs:
      ghcr_image:
        description: "GHCR image reference (registry/owner/repo:tag) — empty when not pushed."
        value: ${{ jobs.build.outputs.ghcr_image }}
      dockerhub_image:
        description: "Docker Hub image reference (user/repo:tag) — empty when not pushed."
        value: ${{ jobs.build.outputs.dockerhub_image }}
      digest:
        description: "Image digest (sha256:...)."
        value: ${{ jobs.build.outputs.digest }}

# Same Node 24 opt-in as the other workflows — see ARCHITECTURE.md.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build & smoke test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # for GHCR push when enabled
    outputs:
      ghcr_image: ${{ steps.meta.outputs.ghcr_image }}
      dockerhub_image: ${{ steps.meta.outputs.dockerhub_image }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Validate inputs
        if: ${{ inputs.push_to_dockerhub && inputs.dockerhub_image == '' }}
        run: |
          echo "::error::push_to_dockerhub=true but dockerhub_image input is empty."
          echo "Pass dockerhub_image (e.g. 'youruser/codeplex-ai') from the caller workflow."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image references
        id: meta
        run: |
          # GHCR requires the repo path to be all-lowercase. Don't trust the
          # caller to provide it that way.
          repo_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          ghcr_base="ghcr.io/${repo_lower}"
          ghcr_tag="${ghcr_base}:${{ inputs.tag }}"
          ghcr_sha="${ghcr_base}:sha-${GITHUB_SHA::12}"

          dh_image="${{ inputs.dockerhub_image }}"
          if [ -n "$dh_image" ]; then
            dh_tag="${dh_image}:${{ inputs.tag }}"
            dh_sha="${dh_image}:sha-${GITHUB_SHA::12}"
          else
            dh_tag=""
            dh_sha=""
          fi

          # The "smoke" tag is what the local container is run under; we use
          # the GHCR tag because it's always present.
          smoke_tag="$ghcr_tag"

          {
            echo "ghcr_tag=${ghcr_tag}"
            echo "ghcr_sha=${ghcr_sha}"
            echo "dh_tag=${dh_tag}"
            echo "dh_sha=${dh_sha}"
            echo "smoke_tag=${smoke_tag}"
            echo "ghcr_image=$([ '${{ inputs.push_to_ghcr }}' = 'true' ] && echo $ghcr_tag || echo '')"
            echo "dockerhub_image=$([ '${{ inputs.push_to_dockerhub }}' = 'true' ] && echo $dh_tag || echo '')"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ inputs.push_to_ghcr }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ inputs.push_to_dockerhub }}
        uses: docker/login-action@v3
        with:
          # No registry argument → defaults to docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Compute the full set of tags to attach at build time. Include both
      # registries so docker push later finds matching local refs without us
      # having to docker tag manually.
      - name: Compose tag list
        id: tags
        run: |
          tags=""
          tags="${tags}${{ steps.meta.outputs.ghcr_tag }}"$'\n'
          tags="${tags}${{ steps.meta.outputs.ghcr_sha }}"$'\n'
          if [ '${{ inputs.push_to_dockerhub }}' = 'true' ]; then
            tags="${tags}${{ steps.meta.outputs.dh_tag }}"$'\n'
            tags="${tags}${{ steps.meta.outputs.dh_sha }}"$'\n'
          fi
          {
            echo "tags<<__EOT__"
            echo "${tags}"
            echo "__EOT__"
          } >> "$GITHUB_OUTPUT"

      # Build with load=true so the image goes into the local Docker daemon
      # for the smoke test below. We push separately after the test passes —
      # never publish an image that hasn't booted at least once.
      - name: Build image (load into local daemon)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          tags: ${{ steps.tags.outputs.tags }}
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Inject build labels so anyone inspecting the image can trace it
          # back to a commit and a workflow run.
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Smoke test — boot container, hit /health
        run: |
          set -euo pipefail

          IMAGE="${{ steps.meta.outputs.smoke_tag }}"
          echo "Booting $IMAGE..."

          # No real API keys needed — /health doesn't call upstream providers.
          docker run -d \
            --name codeplex-smoke \
            -p 8000:8000 \
            -e GOOGLE_API_KEY=smoke-test-not-real \
            -e DEBUG=False \
            "$IMAGE"

          echo "Waiting up to 60s for /health to respond..."
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health -o /tmp/health.json 2>/dev/null; then
              echo "/health responded after ${i} attempts."
              cat /tmp/health.json
              echo
              status=$(jq -r '.data.status // empty' /tmp/health.json)
              if [ "$status" != "healthy" ]; then
                echo "::error::Unexpected /health body — expected data.status='healthy'"
                exit 1
              fi
              echo "Smoke test passed: /health returned 200 with healthy status."
              exit 0
            fi
            sleep 2
          done

          echo "::error::Container did not become healthy within 60s."
          echo "--- docker ps ---"
          docker ps -a
          echo "--- container logs ---"
          docker logs codeplex-smoke || true
          exit 1

      - name: Tear down smoke container
        if: always()
        run: docker rm -f codeplex-smoke 2>/dev/null || true

      # Push only after the smoke test passes — `success()` ensures we don't
      # publish an image that didn't boot.
      - name: Push to GHCR
        if: ${{ inputs.push_to_ghcr && success() }}
        run: |
          set -e
          docker push "${{ steps.meta.outputs.ghcr_tag }}"
          docker push "${{ steps.meta.outputs.ghcr_sha }}"

      - name: Push to Docker Hub
        if: ${{ inputs.push_to_dockerhub && success() }}
        run: |
          set -e
          docker push "${{ steps.meta.outputs.dh_tag }}"
          docker push "${{ steps.meta.outputs.dh_sha }}"

      - name: Summarize
        if: always()
        run: |
          {
            echo "## Docker build summary"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Dockerfile | \`${{ inputs.dockerfile }}\` |"
            echo "| Smoke test | \`${{ job.status }}\` |"
            if [ '${{ inputs.push_to_ghcr }}' = 'true' ]; then
              echo "| GHCR image | \`${{ steps.meta.outputs.ghcr_tag }}\` |"
              echo "| GHCR SHA tag | \`${{ steps.meta.outputs.ghcr_sha }}\` |"
            else
              echo "| GHCR | _skipped_ |"
            fi
            if [ '${{ inputs.push_to_dockerhub }}' = 'true' ]; then
              echo "| Docker Hub image | \`${{ steps.meta.outputs.dh_tag }}\` |"
              echo "| Docker Hub SHA tag | \`${{ steps.meta.outputs.dh_sha }}\` |"
            else
              echo "| Docker Hub | _skipped_ |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

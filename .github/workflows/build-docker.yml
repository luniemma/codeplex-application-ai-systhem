# Reusable workflow: builds the Codeplex AI Docker image, smoke-tests it,
# scans for CVEs, signs it (keyless via Sigstore), and optionally publishes
# multi-arch (amd64 + arm64) images to GHCR, Docker Hub, or both.
#
# Pipeline (all stages gated on the previous one):
#   1. Build amd64 image, load into local Docker daemon
#   2. Smoke test — boot container, verify /health returns the healthy envelope
#   3. Trivy scan — fail on CRITICAL CVEs in the OS or app layers
#   4. Multi-arch rebuild + push to enabled registries (cache makes amd64 ~free)
#   5. Cosign keyless sign (Sigstore OIDC; no key management)
#   6. Workflow summary with image refs and digests
#
# Call from another workflow with:
#
#   jobs:
#     docker:
#       uses: ./.github/workflows/build-docker.yml
#       permissions:
#         contents: read
#         packages: write   # GHCR push
#         id-token: write   # cosign keyless signing
#         security-events: write  # Trivy SARIF upload
#       with:
#         push_to_ghcr: true
#         push_to_dockerhub: true
#         dockerhub_image: "luniemma/codeplex-ai"
#       secrets: inherit

name: Build Docker image

on:
  workflow_call:
    inputs:
      dockerfile:
        description: "Path to the Dockerfile to build."
        type: string
        required: false
        default: Dockerfile
      tag:
        description: "Human-readable tag (in addition to the immutable SHA tag)."
        type: string
        required: false
        default: latest
      push_to_ghcr:
        description: "Push the image to GitHub Container Registry."
        type: boolean
        required: false
        default: false
      push_to_dockerhub:
        description: "Push the image to Docker Hub. Requires DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets."
        type: boolean
        required: false
        default: false
      dockerhub_image:
        description: "Docker Hub image path (e.g. 'luniemma/codeplex-ai'). Required when push_to_dockerhub=true."
        type: string
        required: false
        default: ""
      platforms:
        description: "Comma-separated build targets. Push step always uses both; smoke test always uses amd64."
        type: string
        required: false
        default: "linux/amd64,linux/arm64"
      cve_severity:
        description: "Trivy CVE severities that should fail the build."
        type: string
        required: false
        default: "CRITICAL"
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
    outputs:
      digest:
        description: "Image digest (sha256:...) of the published manifest list."
        value: ${{ jobs.build.outputs.digest }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build, scan, sign, publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # GHCR
      id-token: write          # Cosign keyless signing via Sigstore OIDC
      security-events: write   # Trivy SARIF upload to Code Scanning
    outputs:
      digest: ${{ steps.publish.outputs.digest }}

    steps:
      - name: Validate inputs
        if: ${{ inputs.push_to_dockerhub && inputs.dockerhub_image == '' }}
        run: |
          echo "::error::push_to_dockerhub=true but dockerhub_image input is empty."
          echo "Pass dockerhub_image (e.g. 'youruser/codeplex-ai') from the caller workflow."
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image references
        id: meta
        run: |
          # GHCR rejects mixed-case repo paths; force lowercase.
          repo_lower=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          ghcr_base="ghcr.io/${repo_lower}"
          ghcr_tag="${ghcr_base}:${{ inputs.tag }}"
          ghcr_sha="${ghcr_base}:sha-${GITHUB_SHA::12}"

          dh_image="${{ inputs.dockerhub_image }}"
          if [ -n "$dh_image" ]; then
            dh_tag="${dh_image}:${{ inputs.tag }}"
            dh_sha="${dh_image}:sha-${GITHUB_SHA::12}"
          else
            dh_tag=""
            dh_sha=""
          fi

          {
            echo "ghcr_tag=${ghcr_tag}"
            echo "ghcr_sha=${ghcr_sha}"
            echo "dh_tag=${dh_tag}"
            echo "dh_sha=${dh_sha}"
            # Smoke test image is always tagged with the GHCR ref (cache key).
            echo "smoke_tag=${ghcr_tag}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ inputs.push_to_ghcr }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ inputs.push_to_dockerhub }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Stage 1: build amd64 only, load to local daemon for smoke test ──
      # Multi-arch builds can't be `load`ed; they must be pushed. So we do
      # the smoke test on amd64 first, then rebuild multi-arch on success.
      - name: Build amd64 image for smoke test
        id: build_amd64
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.smoke_tag }}
          push: false
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      - name: Smoke test — boot container, hit /livez
        run: |
          set -euo pipefail

          IMAGE="${{ steps.meta.outputs.smoke_tag }}"
          echo "Booting $IMAGE..."

          docker run -d \
            --name codeplex-smoke \
            -p 8000:8000 \
            -e GOOGLE_API_KEY=smoke-test-not-real \
            -e DEBUG=False \
            "$IMAGE"

          echo "Waiting up to 60s for /livez to respond..."
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/livez -o /tmp/health.json 2>/dev/null; then
              cat /tmp/health.json
              echo
              status=$(jq -r '.data.status // empty' /tmp/health.json)
              if [ "$status" != "healthy" ]; then
                echo "::error::Unexpected /livez body — expected data.status='healthy'"
                exit 1
              fi
              echo "Smoke test passed."
              exit 0
            fi
            sleep 2
          done

          echo "::error::Container did not become healthy within 60s."
          docker ps -a
          docker logs codeplex-smoke || true
          exit 1

      - name: Tear down smoke container
        if: always()
        run: docker rm -f codeplex-smoke 2>/dev/null || true

      # ── Stage 2: scan the smoke-tested amd64 image for CVEs ──
      - name: Trivy CVE scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.meta.outputs.smoke_tag }}
          severity: ${{ inputs.cve_severity }}
          exit-code: "1"
          ignore-unfixed: true   # don't fail on CVEs with no fix available
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

      # ── Stage 3: push multi-arch images. Cache makes amd64 essentially free; only arm64 builds fresh ──
      - name: Compose multi-arch tag list
        id: tags
        run: |
          tags="${{ steps.meta.outputs.ghcr_tag }}"$'\n'"${{ steps.meta.outputs.ghcr_sha }}"
          if [ '${{ inputs.push_to_dockerhub }}' = 'true' ]; then
            tags="${tags}"$'\n'"${{ steps.meta.outputs.dh_tag }}"$'\n'"${{ steps.meta.outputs.dh_sha }}"
          fi
          {
            echo "tags<<__EOT__"
            echo "${tags}"
            echo "__EOT__"
          } >> "$GITHUB_OUTPUT"

      - name: Build & push multi-arch
        id: publish
        if: ${{ (inputs.push_to_ghcr || inputs.push_to_dockerhub) && success() }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          tags: ${{ steps.tags.outputs.tags }}
          push: true
          # provenance=true emits SLSA provenance attestation; sbom=true
          # generates an SPDX SBOM. Both end up as OCI artifacts attached
          # to the manifest, viewable via `docker buildx imagetools inspect`.
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}

      # ── Stage 4: keyless sign with Sigstore. No keys to manage; cosign
      # gets a short-lived certificate from Fulcio using the runner's OIDC
      # token. Verifiers check the certificate's identity claims to confirm
      # the image came from this repo + workflow. ──
      - name: Install cosign
        if: ${{ steps.publish.outcome == 'success' }}
        uses: sigstore/cosign-installer@v3.5.0

      - name: Sign images (Sigstore keyless)
        if: ${{ steps.publish.outcome == 'success' }}
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.publish.outputs.digest }}
        run: |
          set -e
          # Sign every fully-qualified ref by digest — signing by tag is
          # vulnerable to tag mutation between sign and verify.
          for ref in \
              "${{ steps.meta.outputs.ghcr_tag }}" \
              "${{ steps.meta.outputs.ghcr_sha }}" \
              $([ '${{ inputs.push_to_dockerhub }}' = 'true' ] && echo "${{ steps.meta.outputs.dh_tag }}") \
              $([ '${{ inputs.push_to_dockerhub }}' = 'true' ] && echo "${{ steps.meta.outputs.dh_sha }}") ; do
            base="${ref%:*}"
            cosign sign --yes "${base}@${DIGEST}"
          done

      # ── Stage 5: workflow summary ──
      - name: Summarize
        if: always()
        run: |
          {
            echo "## Docker build summary"
            echo
            echo "| Stage | Status |"
            echo "|---|---|"
            echo "| Build amd64 | \`${{ steps.build_amd64.outcome }}\` |"
            echo "| Smoke test | \`${{ job.status }}\` |"
            echo "| Trivy CVE scan (\`${{ inputs.cve_severity }}\`) | scanned, see Code scanning |"
            echo "| Multi-arch publish | \`${{ steps.publish.outcome }}\` |"
            echo "| Cosign signing | $([ '${{ steps.publish.outcome }}' = 'success' ] && echo 'done' || echo 'skipped') |"
            echo
            echo "| Image | Tag |"
            echo "|---|---|"
            if [ '${{ inputs.push_to_ghcr }}' = 'true' ]; then
              echo "| GHCR | \`${{ steps.meta.outputs.ghcr_tag }}\` |"
              echo "| GHCR (immutable) | \`${{ steps.meta.outputs.ghcr_sha }}\` |"
            fi
            if [ '${{ inputs.push_to_dockerhub }}' = 'true' ]; then
              echo "| Docker Hub | \`${{ steps.meta.outputs.dh_tag }}\` |"
              echo "| Docker Hub (immutable) | \`${{ steps.meta.outputs.dh_sha }}\` |"
            fi
            if [ -n "${{ steps.publish.outputs.digest }}" ]; then
              echo
              echo "**Digest:** \`${{ steps.publish.outputs.digest }}\`"
              echo
              echo "Verify the signature with cosign:"
              echo
              echo "\`\`\`bash"
              echo "cosign verify ${{ steps.meta.outputs.ghcr_tag }} \\"
              echo "  --certificate-identity-regexp 'https://github.com/${{ github.repository }}' \\"
              echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com"
              echo "\`\`\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "codeplex-ai.fullname" . }}-config
  labels:
    {{- include "codeplex-ai.labels" . | nindent 4 }}
data:
  {{- /* Render every config key as a string. The REDIS_URL is computed so
         the bundled-Redis case Just Works without operator intervention. */}}
  {{- $resolvedRedis := include "codeplex-ai.redisUrl" . -}}
  {{- range $k, $v := .Values.config }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- if $resolvedRedis }}
  REDIS_URL: {{ $resolvedRedis | quote }}
  {{- end }}

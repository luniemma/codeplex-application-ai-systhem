{{- if .Values.grafanaDashboard.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "codeplex-ai.fullname" . }}-dashboard
  {{- with .Values.grafanaDashboard.namespace }}
  namespace: {{ . }}
  {{- end }}
  labels:
    {{- include "codeplex-ai.labels" . | nindent 4 }}
    {{- with .Values.grafanaDashboard.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  annotations:
    # The grafana sidecar uses this annotation to file dashboards into a folder.
    {{- with .Values.grafanaDashboard.folder }}
    grafana_folder: {{ . | quote }}
    k8s-sidecar-target-directory: {{ printf "/tmp/dashboards/%s" . | quote }}
    {{- end }}
    {{- with .Values.grafanaDashboard.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
data:
  codeplex-ai.json: |-
{{ .Files.Get "dashboards/codeplex-ai.json" | indent 4 }}
{{- end }}

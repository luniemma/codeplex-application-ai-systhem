# Default values for codeplex-ai.
# Reference: https://helm.sh/docs/chart_template_guide/values_files/

# -- Number of pod replicas. Ignored when autoscaling.enabled = true.
replicaCount: 2

image:
  repository: luniemma/codeplex-ai
  tag: ""                 # defaults to .Chart.AppVersion
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false        # the app doesn't talk to the K8s API
  annotations: {}
  name: ""

# Pod-level metadata + scheduling
podAnnotations:
  # Used by static-config Prometheus (the bundled k8s/ stack). Harmless if you
  # rely solely on ServiceMonitor — kube-prometheus-stack ignores these.
  prometheus.io/scrape: "true"
  prometheus.io/port: "8000"
  prometheus.io/path: "/metrics"
podLabels: {}
nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 8000
  annotations: {}

ingress:
  enabled: false
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
  hosts:
    - host: codeplex.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # tls:
  #   - hosts:
  #       - codeplex.example.com
  #     secretName: codeplex-ai-tls

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1
  # maxUnavailable: 1   # set one or the other, not both

# Application config — everything in this map becomes a ConfigMap mounted as
# env. Override any of these per-environment with `--set config.LOG_LEVEL=DEBUG`
# or a values overlay.
config:
  ENVIRONMENT: production
  DEBUG: "False"
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  API_WORKERS: "4"
  LOG_LEVEL: INFO
  LOG_FORMAT: json
  DATABASE_URL: "sqlite:////data/codeplex.db"
  GOOGLE_MODEL: "gemini-2.5-flash"
  OPENAI_MODEL: "gpt-4"
  ANTHROPIC_MODEL: "claude-3-opus"
  OPENAI_TEMPERATURE: "0.7"
  ENABLE_CACHING: "True"
  ENABLE_RATE_LIMITING: "True"
  CACHE_TTL: "3600"
  CACHE_MAX_SIZE: "1000"
  MAX_REQUEST_SIZE: "10485760"
  REQUEST_TIMEOUT: "30"
  CORS_ORIGINS: ""
  ACCESS_LOG: "-"
  ERROR_LOG: "-"
  PROMETHEUS_MULTIPROC_DIR: "/tmp/prometheus_multiproc"

# Provider keys + app secrets. Three modes:
#   1. create=true + values populated (NOT recommended for prod — values.yaml
#      is plaintext and often committed). Useful for local helm install.
#   2. create=false + existingSecret=<name> (recommended — manage secrets
#      out-of-band via Sealed Secrets, External Secrets, sops, etc.)
#   3. create=true + values empty + existingSecret="" → empty Secret (the app
#      will boot but /readyz returns 503 until at least one key is provided).
secrets:
  create: true
  existingSecret: ""
  values:
    OPENAI_API_KEY: ""
    ANTHROPIC_API_KEY: ""
    GOOGLE_API_KEY: ""
    SECRET_KEY: "change-me-for-production"
    JWT_SECRET: "change-me-for-production"

# Override gunicorn entrypoint. Defaults to using gunicorn_config.py so the
# child_exit hook runs (needed to clean up dead-worker metrics files).
command:
  - gunicorn
args:
  - --config=gunicorn_config.py
  - --bind=0.0.0.0:8000
  - main:create_app()

# Probes — paths match the app's /livez and /readyz handlers.
livenessProbe:
  httpGet:
    path: /livez
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /livez
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 24

# Volumes mounted for writeable scratch + multiproc metrics + logs. Override
# to PVC-backed volumes if you need persistence (you generally don't —
# stateless Flask + emptyDir is the right shape).
volumeMounts:
  - name: data
    mountPath: /data
  - name: tmp
    mountPath: /tmp
  - name: prom-multiproc
    mountPath: /tmp/prometheus_multiproc
  - name: logs
    mountPath: /app/logs

volumes:
  - name: data
    emptyDir: {}
  - name: tmp
    emptyDir: {}
  - name: prom-multiproc
    emptyDir: {}
  - name: logs
    emptyDir: {}

# -------------------------------------------------------------------
# Bundled Redis (optional). For production, prefer a managed Redis or
# the bitnami/redis chart. This is a single-replica, no-auth, in-memory
# cache — fine for the rate limiter / cache.
# -------------------------------------------------------------------
redis:
  enabled: true
  image:
    repository: redis
    tag: 7.4-alpine
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
  service:
    port: 6379

# -------------------------------------------------------------------
# Prometheus integration. Two paths:
# 1. ServiceMonitor (kube-prometheus-stack / prometheus-operator). Set
#    serviceMonitor.enabled=true. Requires the ServiceMonitor CRD.
# 2. Static / annotation-based scraping. Set serviceMonitor.enabled=false
#    and rely on the prometheus.io/* podAnnotations above.
# -------------------------------------------------------------------
serviceMonitor:
  enabled: false
  # Namespace where the ServiceMonitor object lives. Empty = release namespace.
  namespace: ""
  # Labels expected by the Prometheus instance's `serviceMonitorSelector`.
  # kube-prometheus-stack default release-name selector uses release=<name>;
  # leave empty to inherit chart labels only.
  labels: {}
  interval: 30s
  scrapeTimeout: 10s
  path: /metrics

# -------------------------------------------------------------------
# Grafana dashboard. When grafanaDashboard.enabled=true, this chart
# emits a ConfigMap labelled `grafana_dashboard: "1"` — kube-prometheus-stack's
# Grafana sidecar auto-imports any ConfigMap with that label.
# -------------------------------------------------------------------
grafanaDashboard:
  enabled: false
  # Namespace where the ConfigMap should live. Empty = release namespace.
  # The sidecar typically watches all namespaces by default.
  namespace: ""
  # Folder under Grafana → Dashboards.
  folder: "Codeplex"
  labels:
    grafana_dashboard: "1"
  annotations: {}
